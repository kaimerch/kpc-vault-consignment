<svg width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Vault Door -->
  <g transform="translate(8, 8)">
    <!-- Outer ring with bolts -->
    <circle cx="22" cy="22" r="20" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    
    <!-- Bolts around perimeter -->
    <circle cx="22" cy="2" r="1.5" fill="#1e3a8a"/>
    <circle cx="34.8" cy="8.2" r="1.5" fill="#1e3a8a"/>
    <circle cx="39.8" cy="22" r="1.5" fill="#1e3a8a"/>
    <circle cx="34.8" cy="35.8" r="1.5" fill="#1e3a8a"/>
    <circle cx="22" cy="42" r="1.5" fill="#1e3a8a"/>
    <circle cx="9.2" cy="35.8" r="1.5" fill="#1e3a8a"/>
    <circle cx="4.2" cy="22" r="1.5" fill="#1e3a8a"/>
    <circle cx="9.2" cy="8.2" r="1.5" fill="#1e3a8a"/>
    
    <!-- Inner wheel/spokes -->
    <circle cx="22" cy="22" r="12" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="22" cy="22" r="4" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    
    <!-- Spokes -->
    <line x1="22" y1="10" x2="22" y2="18" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="26" x2="22" y2="34" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="22" x2="26" y2="22" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="22" x2="10" y2="22" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Diagonal spokes -->
    <line x1="27.66" y1="16.34" x2="22.83" y2="19.17" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="21.17" y1="24.83" x2="16.34" y2="27.66" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="16.34" y1="16.34" x2="21.17" y2="19.17" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
    <line x1="22.83" y1="24.83" x2="27.66" y2="27.66" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Handle -->
  <g transform="translate(2, 18)">
    <rect x="0" y="4" width="3" height="8" rx="1.5" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="0" y="0" width="3" height="4" rx="1.5" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="0" y="12" width="3" height="4" rx="1.5" fill="none" stroke="#1e3a8a" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="55" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a">KPC</text>
  <text x="55" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#6b7280">Vault</text>
</svg>