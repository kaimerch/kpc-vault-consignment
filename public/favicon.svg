<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Bolts around perimeter -->
  <circle cx="16" cy="4" r="1" fill="#1e3a8a"/>
  <circle cx="25.2" cy="9.8" r="1" fill="#1e3a8a"/>
  <circle cx="28" cy="16" r="1" fill="#1e3a8a"/>
  <circle cx="25.2" cy="22.2" r="1" fill="#1e3a8a"/>
  <circle cx="16" cy="28" r="1" fill="#1e3a8a"/>
  <circle cx="6.8" cy="22.2" r="1" fill="#1e3a8a"/>
  <circle cx="4" cy="16" r="1" fill="#1e3a8a"/>
  <circle cx="6.8" cy="9.8" r="1" fill="#1e3a8a"/>
  
  <!-- Inner wheel -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#1e3a8a" stroke-width="2"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
  
  <!-- Main spokes -->
  <line x1="16" y1="8" x2="16" y2="13" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="24" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="19" y2="16" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="16" x2="8" y2="16" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
</svg>